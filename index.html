<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎼 UkeEditor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Caveat:wght@600;700&family=JetBrains+Mono:wght@500&display=swap');

:root {
  --bg:       #1a1c24;
  --surface:  #222530;
  --surface2: #2a2e3d;
  --border:   #363b50;
  --accent:   #f6a05b;
  --blue:     #5b7cf6;
  --chord-c:  #f6a05b;
  --lyric-c:  #e8eaf6;
  --muted:    #7880a0;
  --danger:   #f65b5b;
  --success:  #4caf82;
  --preview-bg: #0f1117;
  --font-jp:   'Noto Sans JP', sans-serif;
  --font-hand: 'Caveat', cursive;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-jp); background: var(--bg); color: var(--lyric-c); display: flex; flex-direction: column; height: 100dvh; }

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 12px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
.app-logo { font-family: var(--font-hand); font-size: 1.3rem; font-weight: 700; color: var(--accent); }
.spacer { flex: 1; min-width: 4px; }

.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: 7px; border: none;
  font-family: var(--font-jp); font-size: 0.78rem; font-weight: 500;
  cursor: pointer; transition: all 0.12s; white-space: nowrap; flex-shrink: 0;
}
.btn:active { filter: brightness(1.15); }
.btn-accent  { background: var(--accent); color: #1a0a00; }
.btn-blue    { background: var(--blue);   color: #fff; }
.btn-ghost   { background: var(--surface2); color: var(--lyric-c); border: 1px solid var(--border); }
.btn-danger  { background: var(--danger); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-preview { background: #2d4a7a; color: #a8c8ff; border: 1px solid #3d5a8a; }
.btn-preview.active { background: #4a7fd4; color: #fff; border-color: #5b8fe0; }
.btn-sm { padding: 5px 9px; font-size: 0.74rem; }
.btn-xs { padding: 3px 7px; font-size: 0.7rem; border-radius: 5px; }

/* ── LAYOUT ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 230px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width 0.22s; overflow: hidden;
}
.sidebar.collapsed { width: 0; }
.sidebar-hdr {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  font-size: 0.7rem; font-weight: 700; color: var(--muted);
  letter-spacing: .1em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.song-list { flex: 1; overflow-y: auto; padding: 5px; }
.song-item {
  padding: 8px 10px; border-radius: 7px; cursor: pointer;
  transition: background 0.12s; margin-bottom: 2px; border: 1px solid transparent;
}
.song-item:hover  { background: var(--surface2); }
.song-item.active { background: rgba(91,124,246,.15); border-color: rgba(91,124,246,.3); }
.song-item .st { font-size: 0.85rem; font-weight: 500; }
.song-item .ss { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
.sidebar-ftr { padding: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }

/* ── EDITOR AREA ── */
.editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Meta bar */
.meta-bar {
  padding: 7px 12px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
}
.meta-input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 9px; color: var(--lyric-c);
  font-family: var(--font-jp); font-size: 0.88rem; outline: none;
}
.meta-input:focus { border-color: var(--accent); }
.title-inp { font-weight: 700; font-size: 0.95rem; flex: 1; min-width: 130px; max-width: 260px; }
.sub-inp   { flex: 1; min-width: 100px; max-width: 190px; font-size: 0.83rem; }

/* ── SECTION BAR ── */
.sec-bar {
  display: flex; align-items: center; gap: 0;
  padding: 0 12px; border-bottom: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0; overflow-x: auto; min-height: 40px;
}
.sec-bar::-webkit-scrollbar { height: 0; }

.sec-tab {
  display: flex; align-items: center; gap: 3px;
  padding: 8px 10px; cursor: pointer; white-space: nowrap;
  font-size: 0.75rem; font-weight: 500;
  color: var(--muted); border-bottom: 2px solid transparent;
  transition: all 0.12s; flex-shrink: 0; position: relative;
}
.sec-tab:hover { color: var(--lyric-c); }
.sec-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.sec-tab-btn {
  background: none; border: none; cursor: pointer;
  font-size: 0.65rem; color: inherit; opacity: .5; padding: 1px 2px; line-height: 1;
}
.sec-tab-btn:active { opacity: 1; }
.sec-add {
  padding: 8px 10px; cursor: pointer; font-size: 0.74rem;
  color: var(--muted); border: none; background: transparent; flex-shrink: 0;
  transition: color 0.12s;
}
.sec-add:active { color: var(--accent); }

/* Section action bar (shown below sec tabs when section selected) */
.sec-action-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; flex-wrap: wrap;
}
.sec-action-label { font-size: 0.7rem; color: var(--muted); }

/* ── LINE AREA ── */
/* Row controls bar above lines */
.line-ctrl-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-bottom: 1px solid var(--border);
  background: var(--surface2); flex-shrink: 0; flex-wrap: wrap;
}
.line-ctrl-label { font-size: 0.7rem; color: var(--muted); }
.sel-status { font-size: 0.72rem; color: var(--success); }

.ed-scroll { flex: 1; overflow-y: auto; padding: 12px 12px 80px; }
.ed-scroll::-webkit-scrollbar { width: 4px; }
.ed-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── LINE ROW ── */
.line-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 6px; }

.line-chk-wrap {
  padding-top: 12px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.line-chk {
  width: 20px; height: 20px; cursor: pointer; accent-color: var(--blue); flex-shrink: 0;
}
.line-add-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer; color: var(--muted);
  font-size: 0.65rem; padding: 2px 4px; line-height: 1; white-space: nowrap;
}
.line-add-btn:active { background: var(--border); color: var(--lyric-c); }

/* Line card */
.line-card {
  flex: 1; background: var(--surface2);
  border: 1.5px solid var(--border); border-radius: 8px;
  overflow: hidden; transition: border-color 0.15s;
}
.line-card.checked   { border-color: var(--blue); background: rgba(91,124,246,.07); }
.line-card.edit-open { border-color: var(--accent); }

/* Display */
.line-display {
  display: flex; flex-wrap: wrap; align-items: flex-end;
  padding: 7px 9px 5px; cursor: pointer; min-height: 44px;
}
.line-display:active { background: rgba(246,160,91,.05); }

.char-cell { display: inline-flex; flex-direction: column; align-items: center; }
.cc-chord {
  font-family: var(--font-hand); font-size: 1rem; font-weight: 700;
  color: var(--chord-c); white-space: nowrap; line-height: 1;
  padding-bottom: 2px; min-height: 20px; display: flex; align-items: flex-end;
}
.cc-char { font-size: 1.05rem; line-height: 1.4; color: var(--lyric-c); white-space: pre; min-width: 0.35rem; }

/* Edit panel */
.line-edit { display: none; padding: 9px; border-top: 1px solid var(--border); background: var(--surface); flex-direction: column; gap: 7px; }
.line-edit.open { display: flex; }
.lyric-ta {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 9px; color: var(--lyric-c);
  font-family: var(--font-jp); font-size: 1rem; line-height: 1.5;
  outline: none; resize: none; height: 58px;
}
.lyric-ta:focus { border-color: var(--blue); }

.chord-area { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.chord-area-label { font-size: 0.68rem; color: var(--muted); width: 100%; }
.chord-chip {
  display: flex; align-items: center; gap: 3px;
  background: rgba(246,160,91,.12); border: 1px solid rgba(246,160,91,.3);
  border-radius: 5px; padding: 2px 7px;
}
.chord-chip-name { font-family: var(--font-hand); font-size: 0.93rem; font-weight: 700; color: var(--chord-c); }
.chord-chip-pos  { font-family: var(--font-mono); font-size: 0.62rem; color: var(--muted); }
.chord-chip-del  { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.72rem; padding: 0 2px; line-height: 1; }
.chord-chip-del:active { color: var(--danger); }
.chord-add-btn {
  background: var(--surface2); border: 1px dashed var(--border);
  border-radius: 5px; padding: 3px 9px; color: var(--muted);
  font-size: 0.72rem; cursor: pointer;
}
.chord-add-btn:active { border-color: var(--accent); color: var(--accent); }
.line-edit-foot { display: flex; gap: 5px; justify-content: flex-end; }

/* ── PREVIEW ── */
.preview-area {
  display: none; flex: 1; overflow-y: auto;
  background: var(--preview-bg); padding: 24px 28px 60px;
}
.preview-area.show { display: block; }
.preview-area::-webkit-scrollbar { width: 4px; }
.preview-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.preview-song-title {
  font-family: var(--font-hand); font-size: 1.8rem; font-weight: 700;
  color: var(--lyric-c); margin-bottom: 2px;
}
.preview-song-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; }
.preview-sec { margin-bottom: 20px; }
.preview-sec-label {
  display: inline-block; font-size: 0.68rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--blue); background: rgba(91,124,246,.12);
  padding: 2px 9px; border-radius: 20px; margin-bottom: 10px;
  border: 1px solid rgba(91,124,246,.25);
}
.preview-line {
  display: flex; flex-wrap: wrap; align-items: flex-end;
  margin-bottom: 18px;
}
.preview-char-cell { display: inline-flex; flex-direction: column; align-items: center; }
.p-chord {
  font-family: var(--font-hand); font-size: 1.05rem; font-weight: 700;
  color: var(--chord-c); white-space: nowrap; line-height: 1;
  padding-bottom: 3px; min-height: 22px; display: flex; align-items: flex-end;
}
.p-char { font-size: 1.1rem; line-height: 1.45; color: var(--lyric-c); white-space: pre; min-width: 0.35rem; }

/* ── MODALS ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(4px);
}
.overlay.hidden { display: none; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 13px; width: min(400px,100%);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,.45);
}
.modal-hdr { padding: 14px 16px 11px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.modal-hdr h2 { font-size: 0.97rem; font-weight: 700; flex: 1; }
.modal-body { padding: 14px 16px; }
.modal-ftr  { padding: 11px 16px; border-top: 1px solid var(--border); display: flex; gap: 6px; justify-content: flex-end; }
.field-row { margin-bottom: 10px; }
.field-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 3px; }
.field-inp {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 9px; color: var(--lyric-c);
  font-family: var(--font-jp); font-size: 0.9rem; outline: none;
}
.field-inp:focus { border-color: var(--accent); }

/* ── CUSTOM DIALOG (confirm / alert) ── */
.dialog-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(4px);
}
.dialog-overlay.hidden { display: none; }
.dialog-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; width: min(340px,100%);
  box-shadow: 0 16px 48px rgba(0,0,0,.5);
  display: flex; flex-direction: column; overflow: hidden;
}
.dialog-body { padding: 20px 20px 14px; font-size: 0.92rem; line-height: 1.6; }
.dialog-body strong { color: var(--accent); }
.dialog-ftr  { padding: 10px 16px 14px; display: flex; gap: 8px; justify-content: flex-end; }

/* empty */
.empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); text-align: center; padding: 40px; }
.empty .ei { font-size: 2.5rem; }
.empty h2  { font-size: 1rem; color: var(--lyric-c); }
.empty p   { font-size: 0.82rem; line-height: 1.65; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="app-logo">🎼 UkeEditor</div>
  <button class="btn btn-ghost btn-sm" onclick="toggleSidebar()">☰</button>
  <div class="spacer"></div>
  <button class="btn btn-preview btn-sm" id="previewBtn" onclick="togglePreview()">👁 プレビュー</button>
  <button class="btn btn-ghost btn-sm" onclick="openLoadFile()">📂 読込</button>
  <button class="btn btn-accent btn-sm" onclick="exportCurrent()">💾 保存</button>
  <button class="btn btn-success btn-sm" onclick="exportAll()">💾 全曲</button>
  <input type="file" id="fileIn" accept=".json" style="display:none" onchange="onLoadFile(event)">
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hdr">
      曲リスト
      <button class="btn btn-xs btn-accent" onclick="openNewSong()">＋新規</button>
    </div>
    <div class="song-list" id="songList"></div>
    <div class="sidebar-ftr">
      <button class="btn btn-ghost btn-sm" onclick="openLoadFile()">📂 JSONを読み込む</button>
      <button class="btn btn-accent btn-sm" onclick="exportCurrent()">💾 現在の曲を保存</button>
      <button class="btn btn-success btn-sm" onclick="exportAll()">💾 全曲を保存</button>
    </div>
  </div>

  <!-- EDITOR AREA -->
  <div class="editor-area" id="editorArea">

    <!-- Empty state -->
    <div class="empty" id="emptyState">
      <div class="ei">🎼</div>
      <h2>曲を選択または新規作成</h2>
      <p>左のリストから曲を選ぶか<br>「＋新規」で曲を作成してください。</p>
      <button class="btn btn-accent" onclick="openNewSong()">＋ 新規作成</button>
    </div>

    <!-- Editor content -->
    <div id="editorContent" style="display:none;flex-direction:column;flex:1;overflow:hidden;">

      <!-- Meta -->
      <div class="meta-bar">
        <input class="meta-input title-inp" id="metaTitle" placeholder="曲名" oninput="onMeta()">
        <input class="meta-input sub-inp"   id="metaSub"   placeholder="サブタイトル" oninput="onMeta()">
      </div>

      <!-- Section tabs -->
      <div class="sec-bar" id="secBar"></div>

      <!-- Section actions -->
      <div class="sec-action-bar" id="secActionBar">
        <span class="sec-action-label">セクション操作：</span>
        <button class="btn btn-ghost btn-xs" onclick="moveSecLeft()"  title="左に移動">◀ 前へ</button>
        <button class="btn btn-ghost btn-xs" onclick="moveSecRight()" title="右に移動">▶ 後へ</button>
        <button class="btn btn-blue btn-xs"  onclick="copySection()"  title="選択中のセクションをコピーして末尾に追加">📋 セクションをコピー</button>
        <button class="btn btn-danger btn-xs" onclick="deleteSection()">🗑 削除</button>
      </div>

      <!-- Line controls bar -->
      <div class="line-ctrl-bar">
        <span class="line-ctrl-label">行操作：</span>
        <button class="btn btn-ghost btn-xs" onclick="deleteCheckedLines()">🗑 選択行を削除</button>
        <button class="btn btn-ghost btn-xs" onclick="clearChecks()">☐ 選択解除</button>
        <span class="sel-status" id="selStatus"></span>
      </div>

      <!-- EDITOR SCROLL (lines) -->
      <div class="ed-scroll" id="edScroll" style="flex:1;display:flex;flex-direction:column;">
        <div id="linesList" style="flex:1;"></div>
        <div style="padding:8px 0 4px">
          <button class="btn btn-ghost btn-sm" style="width:100%" onclick="addLineToEnd()">＋ 行を追加</button>
        </div>
      </div>

      <!-- PREVIEW AREA (shown over editor scroll) -->
      <div class="preview-area" id="previewArea"></div>

    </div>
  </div>
</div>

<!-- ── MODALS ── -->

<!-- New song -->
<div class="overlay hidden" id="newSongModal">
  <div class="modal">
    <div class="modal-hdr"><h2>＋ 新規曲</h2><button class="btn btn-ghost btn-xs" onclick="closeModal('newSongModal')">✕</button></div>
    <div class="modal-body">
      <div class="field-row"><div class="field-label">曲名 *</div><input class="field-inp" id="ns_title" placeholder="曲名"></div>
      <div class="field-row"><div class="field-label">サブタイトル</div><input class="field-inp" id="ns_sub" placeholder="サブタイトル（任意）"></div>
      <div class="field-row"><div class="field-label">最初のセクション名</div><input class="field-inp" id="ns_sec" placeholder="例: 1番、Aメロ（空欄可）"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('newSongModal')">キャンセル</button>
      <button class="btn btn-accent btn-sm" onclick="createSong()">作成</button>
    </div>
  </div>
</div>

<!-- Add section -->
<div class="overlay hidden" id="addSecModal">
  <div class="modal">
    <div class="modal-hdr"><h2>＋ セクションを追加</h2><button class="btn btn-ghost btn-xs" onclick="closeModal('addSecModal')">✕</button></div>
    <div class="modal-body">
      <div class="field-row"><div class="field-label">セクション名</div><input class="field-inp" id="as_name" placeholder="例: 2番、Bメロ、サビ"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('addSecModal')">キャンセル</button>
      <button class="btn btn-accent btn-sm" onclick="commitAddSec()">追加</button>
    </div>
  </div>
</div>

<!-- Chord bulk editor -->
<div class="overlay hidden" id="chordBulkModal">
  <div class="modal" style="width:min(560px,100%);max-height:90dvh;">
    <div class="modal-hdr">
      <h2>🎸 コードを編集</h2>
      <button class="btn btn-ghost btn-xs" onclick="closeModal('chordBulkModal')">✕</button>
    </div>
    <div class="modal-body" style="overflow-y:auto;padding:12px 14px;">
      <!-- 文字グリッド（位置選択） -->
      <div class="field-label" style="margin-bottom:6px">① 文字を選択してコードを入力</div>
      <div id="cbm_grid" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;"></div>
      <!-- 選択中の文字へのコード入力 -->
      <div id="cbm_input_area" style="display:none;margin-bottom:14px;">
        <div class="field-label" style="margin-bottom:4px">② コード名を入力（空欄で削除）</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <input class="field-inp" id="cbm_name" style="flex:1"
            placeholder="例: G, Am, D7" autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="btn btn-accent btn-sm" onclick="cbmSetChord()">セット</button>
        </div>
      </div>
      <!-- 現在のコード一覧 -->
      <div class="field-label" style="margin-bottom:6px">③ 現在のコード一覧（タップで選択・編集）</div>
      <div id="cbm_list" style="display:flex;flex-wrap:wrap;gap:6px;min-height:36px;"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('chordBulkModal')">キャンセル</button>
      <button class="btn btn-accent btn-sm" onclick="cbmSave()">保存</button>
    </div>
  </div>
</div>

<!-- Copy section (name editor) -->
<div class="overlay hidden" id="copySectionModal">
  <div class="modal">
    <div class="modal-hdr"><h2>📋 セクションをコピー</h2><button class="btn btn-ghost btn-xs" onclick="closeModal('copySectionModal')">✕</button></div>
    <div class="modal-body">
      <div class="field-row"><div class="field-label">コピー後のセクション名</div><input class="field-inp" id="cs_name" placeholder="例: 2番"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('copySectionModal')">キャンセル</button>
      <button class="btn btn-blue btn-sm" onclick="commitCopySection()">コピーして追加</button>
    </div>
  </div>
</div>

<!-- Custom dialog (replaces confirm/alert) -->
<div class="dialog-overlay hidden" id="dialogOverlay">
  <div class="dialog-box">
    <div class="dialog-body" id="dialogMsg"></div>
    <div class="dialog-ftr" id="dialogFtr"></div>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
let songs    = [];
let curSong  = -1;
let curSec   = 0;
let checkedLines = new Set();
let openPanel    = -1;
let previewMode  = false;

/* ══════════════════════════════════
   PERSISTENCE
══════════════════════════════════ */
function persist() { localStorage.setItem('ukeeditor3', JSON.stringify(songs)); }
function restore() {
  try { songs = JSON.parse(localStorage.getItem('ukeeditor3') || '[]'); }
  catch { songs = []; }
}

/* ══════════════════════════════════
   CUSTOM DIALOG  (replaces confirm/alert)
══════════════════════════════════ */
// showDialog({ msg, buttons: [{label, style, action}] })
function showDialog({ msg, buttons }) {
  document.getElementById('dialogMsg').innerHTML = msg;
  const ftr = document.getElementById('dialogFtr');
  ftr.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `btn btn-sm ${b.style || 'btn-ghost'}`;
    btn.textContent = b.label;
    btn.onclick = () => { closeDialog(); b.action?.(); };
    ftr.appendChild(btn);
  });
  document.getElementById('dialogOverlay').classList.remove('hidden');
}
function closeDialog() {
  document.getElementById('dialogOverlay').classList.add('hidden');
}

function showAlert(msg, onOk) {
  showDialog({ msg, buttons: [{ label: 'OK', style: 'btn-accent', action: onOk }] });
}
function showConfirm(msg, onOk) {
  showDialog({
    msg,
    buttons: [
      { label: 'キャンセル', style: 'btn-ghost', action: null },
      { label: 'OK', style: 'btn-danger', action: onOk }
    ]
  });
}

/* ══════════════════════════════════
   ACCESSORS
══════════════════════════════════ */
const song  = () => songs[curSong];
const sec   = () => song()?.sections[curSec];
const lines = () => sec()?.lines ?? [];

/* ══════════════════════════════════
   LINE HELPERS
══════════════════════════════════ */
function makeLine(text = '') { return { chars: [...text], chords: {} }; }
function cloneLine(l)        { return { chars: [...l.chars], chords: { ...l.chords } }; }
function cloneSection(s)     { return { label: s.label, lines: s.lines.map(cloneLine) }; }

function remapChords(chords, newLen) {
  const out = {};
  for (const [k, v] of Object.entries(chords)) {
    if (parseInt(k) < newLen) out[k] = v;
  }
  return out;
}

/* ══════════════════════════════════
   ESC
══════════════════════════════════ */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════
   RENDER: SONG LIST
══════════════════════════════════ */
function renderSongList() {
  const el = document.getElementById('songList');
  el.innerHTML = songs.length
    ? songs.map((s,i) => `
        <div class="song-item ${i===curSong?'active':''}" onclick="selectSong(${i})">
          <div class="st">${esc(s.title||'無題')}</div>
          <div class="ss">${esc(s.subtitle||'')}</div>
        </div>`).join('')
    : '<div style="padding:12px;color:var(--muted);font-size:.8rem;text-align:center">曲がありません</div>';
}

/* ══════════════════════════════════
   RENDER: SECTION TABS
══════════════════════════════════ */
function renderSecTabs() {
  const s = song(); if (!s) return;
  const total = s.sections.length;
  document.getElementById('secBar').innerHTML =
    s.sections.map((sc, i) => `
      <div class="sec-tab ${i===curSec?'active':''}" onclick="selectSec(${i})">
        ${esc(sc.label || '（無題）')}
      </div>`).join('') +
    `<button class="sec-add" onclick="openAddSec()">＋ セクション追加</button>`;
}

/* ══════════════════════════════════
   RENDER: LINES
══════════════════════════════════ */
function renderLines() {
  checkedLines.clear();
  openPanel = -1;
  document.getElementById('selStatus').textContent = '';
  const ll = lines();
  document.getElementById('linesList').innerHTML =
    ll.map((line, li) => renderLineRow(line, li)).join('');
}

function renderLineRow(line, li) {
  const cells = line.chars.map((ch, ci) => {
    const chord = line.chords[String(ci)] || '';
    return `<div class="char-cell">
      <div class="cc-chord">${esc(chord)}</div>
      <div class="cc-char">${ch===' '?'&nbsp;':esc(ch)}</div>
    </div>`;
  }).join('');

  const chips = Object.entries(line.chords)
    .sort((a,b) => +a[0] - +b[0])
    .map(([idx, name]) => {
      const ch = line.chars[+idx] ?? '?';
      return `<div class="chord-chip">
        <span class="chord-chip-pos">${idx}:${esc(ch)}</span>
        <span class="chord-chip-name">${esc(name)}</span>
        <button class="chord-chip-del" onclick="deleteChord(${li},'${idx}')">✕</button>
      </div>`;
    }).join('');

  return `
  <div class="line-row" id="lr-${li}">
    <div class="line-chk-wrap">
      <input type="checkbox" class="line-chk" id="chk-${li}" onchange="onCheck(${li},this.checked)">
      <button class="line-add-btn" onclick="addLineAbove(${li})">↑＋</button>
      <button class="line-add-btn" onclick="addLineBelow(${li})">↓＋</button>
    </div>
    <div class="line-card" id="lc-${li}">
      <div class="line-display" onclick="togglePanel(${li})" id="ld-${li}">
        ${cells || '<span style="color:var(--muted);font-size:.83rem">（空行）</span>'}
      </div>
      <div class="line-edit" id="le-${li}">
        <div style="font-size:.68rem;color:var(--muted)">歌詞（1行）</div>
        <textarea class="lyric-ta" id="ta-${li}"
          oninput="onLyricInput(${li})"
          onblur="commitLyric(${li})"
        >${esc(line.chars.join(''))}</textarea>
        <div class="chord-area">
          <div class="chord-area-label">コード一覧</div>
          ${chips || '<span style="font-size:.72rem;color:var(--muted)">コードなし</span>'}
          <button class="chord-add-btn" onclick="openChordBulk(${li})">🎸 コードを追加・編集・削除</button>
        </div>
        <div class="line-edit-foot">
          <button class="btn btn-blue btn-xs" onclick="togglePanel(${li})">完了</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════
   EDIT PANEL
══════════════════════════════════ */
function togglePanel(li) {
  if (openPanel >= 0 && openPanel !== li) {
    document.getElementById(`le-${openPanel}`)?.classList.remove('open');
    document.getElementById(`lc-${openPanel}`)?.classList.remove('edit-open');
  }
  const panel = document.getElementById(`le-${li}`);
  const card  = document.getElementById(`lc-${li}`);
  const open  = panel.classList.toggle('open');
  card.classList.toggle('edit-open', open);
  openPanel = open ? li : -1;
  if (open) {
    const ta = document.getElementById(`ta-${li}`);
    ta?.focus(); ta?.setSelectionRange(ta.value.length, ta.value.length);
  }
}

/* ══════════════════════════════════
   LYRIC
══════════════════════════════════ */
function onLyricInput(li) {
  const ta   = document.getElementById(`ta-${li}`);
  const line = lines()[li];
  const newChars = [...ta.value];
  const ld = document.getElementById(`ld-${li}`);
  if (ld) {
    ld.innerHTML = newChars.map((ch, ci) => {
      const chord = line.chords[String(ci)] || '';
      return `<div class="char-cell">
        <div class="cc-chord">${esc(chord)}</div>
        <div class="cc-char">${ch===' '?'&nbsp;':esc(ch)}</div>
      </div>`;
    }).join('') || '<span style="color:var(--muted);font-size:.83rem">（空行）</span>';
  }
}

function commitLyric(li) {
  const ta = document.getElementById(`ta-${li}`); if (!ta) return;
  const line = lines()[li];
  line.chars  = [...ta.value];
  line.chords = remapChords(line.chords, line.chars.length);
  persist();
  refreshChips(li);
}

function refreshChips(li) {
  const line  = lines()[li];
  const panel = document.getElementById(`le-${li}`); if (!panel) return;
  const area  = panel.querySelector('.chord-area'); if (!area) return;
  const chips = Object.entries(line.chords)
    .sort((a,b) => +a[0] - +b[0])
    .map(([idx, name]) => {
      const ch = line.chars[+idx] ?? '?';
      return `<div class="chord-chip">
        <span class="chord-chip-pos">${idx}:${esc(ch)}</span>
        <span class="chord-chip-name">${esc(name)}</span>
      </div>`;
    }).join('');
  area.innerHTML = `
    <div class="chord-area-label">コード一覧</div>
    ${chips || '<span style="font-size:.72rem;color:var(--muted)">コードなし</span>'}
    <button class="chord-add-btn" onclick="openChordBulk(${li})">🎸 コードを追加・編集・削除</button>`;
}

/* ══════════════════════════════════
   CHORD BULK EDITOR
══════════════════════════════════ */
let cbmLI = -1;          // 編集中の行インデックス
let cbmDraft = {};        // モーダル内の作業コピー { idx: name }
let cbmSelCI = -1;        // 現在選択中の文字インデックス

function openChordBulk(li) {
  cbmLI = li;
  const line = lines()[li];
  cbmDraft = { ...line.chords };  // 作業コピー
  cbmSelCI = -1;
  cbmRenderGrid(line);
  cbmRenderList();
  document.getElementById('cbm_input_area').style.display = 'none';
  document.getElementById('cbm_name').value = '';
  openModal('chordBulkModal');
}

function cbmRenderGrid(line) {
  const l = line || lines()[cbmLI];
  document.getElementById('cbm_grid').innerHTML = l.chars.map((ch, ci) => {
    const hasChord = cbmDraft[String(ci)];
    const isSel    = ci === cbmSelCI;
    const style = isSel
      ? 'background:rgba(246,160,91,.3);border-color:var(--accent);color:var(--accent)'
      : hasChord
        ? 'background:rgba(246,160,91,.12);border-color:rgba(246,160,91,.4)'
        : '';
    return `<div onclick="cbmSelectChar(${ci})"
      style="border:1px solid var(--border);border-radius:5px;padding:4px 7px;
             cursor:pointer;text-align:center;min-width:32px;${style}">
      <div style="font-size:0.92rem;color:var(--lyric-c)">${ch===' '?'␣':esc(ch)}</div>
      <div style="font-size:0.6rem;color:var(--muted);font-family:var(--font-mono)">${ci}</div>
      ${hasChord ? `<div style="font-family:var(--font-hand);font-size:0.8rem;color:var(--chord-c);line-height:1">${esc(cbmDraft[String(ci)])}</div>` : ''}
    </div>`;
  }).join('');
}

function cbmSelectChar(ci) {
  cbmSelCI = ci;
  const existing = cbmDraft[String(ci)] || '';
  document.getElementById('cbm_name').value = existing;
  document.getElementById('cbm_input_area').style.display = 'block';
  cbmRenderGrid();
  cbmRenderList();
  setTimeout(() => document.getElementById('cbm_name').focus(), 40);
}

function cbmSetChord() {
  if (cbmSelCI < 0) { showAlert('文字を選択してください'); return; }
  const name = document.getElementById('cbm_name').value.trim();
  if (name) {
    cbmDraft[String(cbmSelCI)] = name;
  } else {
    delete cbmDraft[String(cbmSelCI)];
  }
  // 次の文字へ自動移動
  const lineLen = lines()[cbmLI].chars.length;
  cbmSelCI = cbmSelCI + 1 < lineLen ? cbmSelCI + 1 : -1;
  document.getElementById('cbm_name').value = cbmSelCI >= 0 ? (cbmDraft[String(cbmSelCI)] || '') : '';
  if (cbmSelCI < 0) document.getElementById('cbm_input_area').style.display = 'none';
  cbmRenderGrid();
  cbmRenderList();
  if (cbmSelCI >= 0) setTimeout(() => document.getElementById('cbm_name').focus(), 40);
}

function cbmRenderList() {
  const line = lines()[cbmLI];
  const entries = Object.entries(cbmDraft).sort((a,b) => +a[0] - +b[0]);
  document.getElementById('cbm_list').innerHTML = entries.length
    ? entries.map(([idx, name]) => {
        const ch = line.chars[+idx] ?? '?';
        const isSel = +idx === cbmSelCI;
        return `<div onclick="cbmSelectChar(${idx})"
          style="display:flex;align-items:center;gap:5px;
                 background:${isSel?'rgba(246,160,91,.25)':'rgba(246,160,91,.1)'};
                 border:1px solid ${isSel?'var(--accent)':'rgba(246,160,91,.3)'};
                 border-radius:6px;padding:4px 9px;cursor:pointer;">
          <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--muted)">${idx}:${esc(ch)}</span>
          <span style="font-family:var(--font-hand);font-size:1rem;font-weight:700;color:var(--chord-c)">${esc(name)}</span>
          <button onclick="event.stopPropagation();cbmDelete('${idx}')"
            style="background:none;border:none;color:var(--muted);cursor:pointer;
                   font-size:0.75rem;padding:0 2px;line-height:1;margin-left:2px">✕</button>
        </div>`;
      }).join('')
    : '<span style="font-size:.75rem;color:var(--muted)">コードなし</span>';
}

function cbmDelete(idx) {
  delete cbmDraft[String(idx)];
  if (cbmSelCI === +idx) {
    cbmSelCI = -1;
    document.getElementById('cbm_input_area').style.display = 'none';
  }
  cbmRenderGrid();
  cbmRenderList();
}

function cbmSave() {
  lines()[cbmLI].chords = { ...cbmDraft };
  persist();
  closeModal('chordBulkModal');
  refreshChips(cbmLI);
  onLyricInput(cbmLI);
}

document.getElementById('cbm_name').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); cbmSetChord(); }
});

/* ══════════════════════════════════
   LINE OPERATIONS
══════════════════════════════════ */
function addLineAbove(li) { openPanel=-1; sec().lines.splice(li,0,makeLine()); persist(); renderLines(); }
function addLineBelow(li) {
  openPanel=-1; sec().lines.splice(li+1,0,makeLine()); persist(); renderLines();
  setTimeout(() => togglePanel(li+1), 40);
}
function addLineToEnd() {
  openPanel=-1; sec().lines.push(makeLine()); persist(); renderLines();
  setTimeout(() => { togglePanel(lines().length-1); document.getElementById('edScroll').scrollTop=99999; }, 40);
}

function onCheck(li, checked) {
  if (checked) checkedLines.add(li); else checkedLines.delete(li);
  document.getElementById(`lc-${li}`)?.classList.toggle('checked', checked);
  document.getElementById('selStatus').textContent = checkedLines.size ? `${checkedLines.size}行選択中` : '';
}

function deleteCheckedLines() {
  if (!checkedLines.size) {
    showAlert('削除する行をチェックしてください'); return;
  }
  const indices = [...checkedLines].sort((a,b) => b-a);
  showConfirm(`${indices.length}行を削除しますか？`, () => {
    openPanel = -1;
    const ll = sec().lines;
    indices.forEach(i => {
      if (ll.length > 1) ll.splice(i, 1);
      else ll[0] = makeLine();
    });
    persist(); renderLines();
  });
}

function clearChecks() {
  checkedLines.clear();
  document.querySelectorAll('.line-chk').forEach(c => { c.checked=false; });
  document.querySelectorAll('.line-card').forEach(c => c.classList.remove('checked'));
  document.getElementById('selStatus').textContent = '';
}

/* ══════════════════════════════════
   SECTION OPERATIONS
══════════════════════════════════ */
function selectSec(i) {
  curSec = i; openPanel = -1;
  renderSecTabs(); renderLines();
}

function openAddSec() {
  openModal('addSecModal');
  setTimeout(() => document.getElementById('as_name').focus(), 60);
}
function commitAddSec() {
  const label = document.getElementById('as_name').value.trim();
  song().sections.push({ label, lines: [makeLine()] });
  curSec = song().sections.length - 1;
  persist(); closeModal('addSecModal'); renderSecTabs(); renderLines();
  document.getElementById('as_name').value = '';
}

function deleteSection() {
  const s = song(); if (!s) return;
  if (s.sections.length === 1) {
    showAlert('最後のセクションは削除できません'); return;
  }
  const label = s.sections[curSec].label || '（無題）';
  showConfirm(`セクション「${label}」を削除しますか？`, () => {
    s.sections.splice(curSec, 1);
    if (curSec >= s.sections.length) curSec = s.sections.length - 1;
    persist(); renderSecTabs(); renderLines();
  });
}

function copySection() {
  const s = song(); if (!s) return;
  const src = s.sections[curSec];
  document.getElementById('cs_name').value = (src.label || '') + ' (コピー)';
  openModal('copySectionModal');
  setTimeout(() => {
    const inp = document.getElementById('cs_name');
    inp.focus(); inp.select();
  }, 60);
}

function commitCopySection() {
  const s = song(); if (!s) return;
  const label = document.getElementById('cs_name').value.trim();
  const clone = cloneSection(s.sections[curSec]);
  clone.label = label;
  s.sections.push(clone);
  curSec = s.sections.length - 1;
  persist(); closeModal('copySectionModal'); renderSecTabs(); renderLines();
}

function moveSecLeft() {
  const s = song(); if (!s || curSec === 0) return;
  [s.sections[curSec-1], s.sections[curSec]] = [s.sections[curSec], s.sections[curSec-1]];
  curSec--;
  persist(); renderSecTabs(); renderLines();
}

function moveSecRight() {
  const s = song(); if (!s || curSec >= s.sections.length-1) return;
  [s.sections[curSec+1], s.sections[curSec]] = [s.sections[curSec], s.sections[curSec+1]];
  curSec++;
  persist(); renderSecTabs(); renderLines();
}

/* ══════════════════════════════════
   PREVIEW
══════════════════════════════════ */
function togglePreview() {
  previewMode = !previewMode;
  const btn  = document.getElementById('previewBtn');
  const prev = document.getElementById('previewArea');
  const edit = document.getElementById('edScroll');

  btn.classList.toggle('active', previewMode);
  btn.textContent = previewMode ? '✏️ 編集に戻る' : '👁 プレビュー';

  if (previewMode) {
    renderPreview();
    prev.classList.add('show');
    edit.style.display = 'none';
  } else {
    prev.classList.remove('show');
    edit.style.display = 'flex';
  }
}

function renderPreview() {
  const s = song(); if (!s) return;
  const pa = document.getElementById('previewArea');
  pa.innerHTML = `
    <div class="preview-song-title">${esc(s.title||'無題')}</div>
    <div class="preview-song-sub">${esc(s.subtitle||'')}</div>
    ${s.sections.map(sc => `
      <div class="preview-sec">
        ${sc.label ? `<div class="preview-sec-label">${esc(sc.label)}</div>` : ''}
        ${sc.lines.map(line => `
          <div class="preview-line">
            ${line.chars.map((ch, ci) => {
              const chord = line.chords[String(ci)] || '';
              return `<div class="preview-char-cell">
                <div class="p-chord">${esc(chord)}</div>
                <div class="p-char">${ch===' '?'&nbsp;':esc(ch)}</div>
              </div>`;
            }).join('')}
          </div>`).join('')}
      </div>`).join('')}`;
}

/* ══════════════════════════════════
   SONG MANAGEMENT
══════════════════════════════════ */
function selectSong(i) {
  curSong=i; curSec=0; openPanel=-1;
  if (previewMode) togglePreview();
  renderAll();
}

function onMeta() {
  if (!song()) return;
  song().title    = document.getElementById('metaTitle').value;
  song().subtitle = document.getElementById('metaSub').value;
  persist(); renderSongList();
}

function openNewSong() {
  openModal('newSongModal');
  setTimeout(() => document.getElementById('ns_title').focus(), 60);
}
function createSong() {
  const title = document.getElementById('ns_title').value.trim() || '無題';
  const sub   = document.getElementById('ns_sub').value.trim();
  const sec   = document.getElementById('ns_sec').value.trim();
  songs.push({ title, subtitle: sub, sections: [{ label: sec, lines: [makeLine()] }] });
  curSong = songs.length-1; curSec = 0;
  persist(); closeModal('newSongModal');
  ['ns_title','ns_sub','ns_sec'].forEach(id => document.getElementById(id).value='');
  renderAll();
}

/* ══════════════════════════════════
   EXPORT / IMPORT
══════════════════════════════════ */
function exportCurrent() {
  if (curSong<0) { showAlert('曲が選択されていません'); return; }
  dl({ version:2, songs:[song()] }, safe(song().title)+'.json');
}
function exportAll() {
  if (!songs.length) { showAlert('曲がありません'); return; }
  dl({ version:2, songs }, `ukescore_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.json`);
}
function dl(data, fname) {
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})),
    download: fname
  });
  a.click(); URL.revokeObjectURL(a.href);
}
function safe(s) { return (s||'song').replace(/[\\/:*?"<>|]/g,'_').slice(0,40); }

function openLoadFile() { document.getElementById('fileIn').click(); }
function onLoadFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const p = JSON.parse(ev.target.result);
      const inc = p.version===2&&Array.isArray(p.songs) ? p.songs
                : Array.isArray(p) ? p : p.title ? [p] : null;
      if (!inc) { showAlert('読み込めないファイル形式です'); return; }
      const ex = new Set(songs.map(s=>s.title));
      let added = 0;
      inc.forEach(s => { if (!ex.has(s.title)) { songs.push(s); added++; } });
      persist();
      if (added > 0) { curSong=songs.length-1; curSec=0; }
      renderAll(); showAlert(`${added}曲を読み込みました`);
    } catch(err) { showAlert('エラー: '+err.message); }
    e.target.value='';
  };
  r.readAsText(f);
}

/* ══════════════════════════════════
   SIDEBAR / MODAL
══════════════════════════════════ */
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
function openModal(id)   { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id)  { document.getElementById(id).classList.add('hidden'); }

/* ══════════════════════════════════
   RENDER ALL
══════════════════════════════════ */
function renderAll() {
  renderSongList();
  const s = song();
  if (!s) {
    document.getElementById('emptyState').style.display    = 'flex';
    document.getElementById('editorContent').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display    = 'none';
  document.getElementById('editorContent').style.display = 'flex';
  document.getElementById('metaTitle').value = s.title    || '';
  document.getElementById('metaSub').value   = s.subtitle || '';
  renderSecTabs(); renderLines();
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
restore();
if (songs.length > 0) { curSong=0; curSec=0; }
renderAll();
</script>
